<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
#picker { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; color: #fff; font-family: sans-serif; gap: 16px; }
#picker input { display: none; }
#picker label { cursor: pointer; padding: 12px 24px; border: 1px solid #555; border-radius: 6px; font-size: 14px; }
#picker label:hover { background: #222; }
#picker p { font-size: 13px; color: #888; }
#viewer { display: none; text-align: center; }
#viewer img { display: block; margin: 0 auto; max-width: 100%; height: auto; line-height: 0; }
</style>
</head>
<body>

<div id="picker">
  <p>Pilih folder hasil potongan gambar</p>
  <label for="folderInput">📁 Buka Folder</label>
  <input type="file" id="folderInput" webkitdirectory multiple accept="image/*">
  <p id="hint">Pilih folder yang berisi file hasil split (JPG/PNG)</p>
</div>

<div id="viewer" id="viewer"></div>

<script>
document.getElementById('folderInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files).filter(f =>
    /\.(jpe?g|png|webp|gif|bmp)$/i.test(f.name)
  );

  if (files.length === 0) {
    document.getElementById('hint').textContent = 'Tidak ada gambar ditemukan di folder ini.';
    return;
  }

  // Urutkan berdasarkan nama file (numerik/alphabetical)
  files.sort((a, b) => {
    const na = a.name.replace(/\D+/g, '').padStart(10, '0') + a.name;
    const nb = b.name.replace(/\D+/g, '').padStart(10, '0') + b.name;
    return na.localeCompare(nb);
  });

  const viewer = document.getElementById('viewer');
  viewer.innerHTML = '';

  files.forEach(file => {
    const url = URL.createObjectURL(file);
    const img = document.createElement('img');
    img.src = url;
    img.alt = file.name;
    viewer.appendChild(img);
  });

  document.getElementById('picker').style.display = 'none';
  viewer.style.display = 'block';
});
</script>
</body>
</html>
